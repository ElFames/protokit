syntax = "proto3";

option java_package = "es.smarting.motorcloud.data.device";

message DeviceInfo {
  bytes device_id = 1;
  bytes app_instance_id = 2;

  enum DevicePlatform {
    Platform_Undefined = 0;
    Platform_Android = 1;
    Platform_IOS = 2;
  }
  DevicePlatform device_platform = 3;

  string os_version = 4;
  string device_maker = 5;
  string device_model = 6;
  string tamper_status = 7;
  string device_locale = 8;
  string app_locale = 9;
  string fcm_token = 10;
  DeviceSessionInfo session_info = 11;
  int32 version_code = 12;
  string app_version_name = 13;
  bytes apns_token = 14;
  string app_name = 15;
  int64 device_time_epoch = 16;
}

message DeviceSessionInfo {
  string session_tag = 1;
  string session_id = 2;
  int32  system_version_access = 3;
  int64  expiration = 4;
  string session_refresh = 5;
}