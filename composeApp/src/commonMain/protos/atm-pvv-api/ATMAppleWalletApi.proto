syntax = "proto3";
option java_package = "es.smarting.atm.pvv";

service ATMAppleWalletService {
  rpc getUserQueuePosition(UserQueuePositionRequest) returns (UserQueuePositionResponse);
}

message UserQueuePositionRequest {
  string pvvToken = 1;
}

message UserQueuePositionResponse {
  int32 status = 1;
  int64 queuePosition = 2;
}

